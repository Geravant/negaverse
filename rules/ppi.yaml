# Structural / biological rules for protein–protein interactions.
# One entry per rule. Deterministic filters evaluate `when`; the literature/LLM
# filter receives `rationale` as grounding context. Add a rule = add an entry.
# See rules/README.md for the field contract.

- id: colocalization_mismatch
  modality: ppi
  applies_to: [protein, protein]
  when: "disjoint(a.compartments, b.compartments)"
  effect: safer_negative            # safer_negative | riskier_negative | veto
  weight: 0.8
  flag: different_compartment
  rationale: >
    Two proteins that never share a subcellular compartment cannot physically
    interact, so a non-edge between them is a safe negative.
  source: "GO cellular_component"

- id: hydrophobicity_mismatch
  modality: ppi
  applies_to: [protein, protein]
  when: "a.surface_hydrophobicity - b.surface_hydrophobicity > 0.12 or b.surface_hydrophobicity - a.surface_hydrophobicity > 0.12"
  effect: safer_negative
  weight: 0.3                         # deliberately low — weak signal (see below)
  flag: hydrophobicity_mismatch
  rationale: >
    Interacting proteins tend to share biophysical context (both membrane-
    associated or both soluble), so a large mismatch in mean surface
    hydrophobicity makes a non-edge a somewhat safer negative. NOTE this is a
    weak whole-protein proxy, not interface complementarity: on HuRI the mean
    Kyte-Doolittle hydrophobicity separates real edges from non-edges at only
    AUROC ~0.55 (dissimilarity direction). At |Δh|>0.12 non-edges are ~1.6x
    enriched over edges — hence low weight. A proper interface-hydrophobicity
    feature needs surface/patch-resolved data we don't yet have.
  source: "Kyte-Doolittle mean (scripts/compute_hydrophobicity.py); threshold 0.12 calibrated on HuRI edge-vs-nonedge enrichment"

- id: functional_process_mismatch
  modality: ppi
  applies_to: [protein, protein]
  when: "disjoint(a.processes, b.processes)"
  effect: safer_negative
  weight: 0.3                         # low — weak signal (see below)
  flag: different_process
  rationale: >
    Two proteins annotated to entirely non-overlapping GO biological processes
    are somewhat less likely to be functional interaction partners. Independent
    of both graph topology and subcellular localization (GO biological_process,
    not cellular_component). NOTE weak with EXACT-term matching: on HuRI 95% of
    non-edges but also 88% of real edges are disjoint (interactors often share a
    parent process, not the exact leaf term), so this only ~1.08x enriches and
    separates at AUROC ~0.54. A GO-hierarchy semantic similarity would be
    stronger — hence low weight until that's built.
  source: "GO biological_process, GOA human GAF (scripts/build_go_process.py)"

- id: no_shared_neighbors_low_expected_edge
  modality: ppi
  applies_to: [protein, protein]
  when: "disjoint(a.neighbors, b.neighbors) and (a.degree * b.degree) / a.graph_two_m < 0.01"
  effect: safer_negative
  weight: 0.7                       # topology, no_overlap/easy_negative proxy: 0.7-0.9
  rationale: >
    Two proteins with no shared interactors and a configuration-model expected
    edge count near zero are rarely adjacent in this network, so a non-edge
    between them is a safer negative.
  source: "TODO — threshold to confirm; mirrors negaverse/streams/topology.py::TopologyFilter"

- id: evolutionary_coupling_absence
  modality: ppi
  applies_to: [protein, protein]
  when: "a.evolutionary_coupling_score_with_b < 0.1"
  effect: safer_negative
  weight: 0.5                       # well-sampled orthologs: 0.5-0.7; conservative until MSA depth is checked
  rationale: >
    Proteins with no detectable co-evolution signal across well-sampled
    orthologs are less likely to form a conserved physical complex, making a
    non-edge a safer negative.
  source: "TODO — EVcouplings threshold to confirm"

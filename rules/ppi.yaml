# Structural / biological rules for protein–protein interactions.
# One entry per rule. Deterministic filters evaluate `when`; the literature/LLM
# filter receives `rationale` as grounding context. Add a rule = add an entry.
# See rules/README.md for the field contract.

- id: colocalization_mismatch
  modality: ppi
  applies_to: [protein, protein]
  when: "disjoint(a.compartments, b.compartments)"
  effect: safer_negative            # safer_negative | riskier_negative | veto
  weight: 0.8
  flag: different_compartment
  rationale: >
    Two proteins that never share a subcellular compartment cannot physically
    interact, so a non-edge between them is a safe negative.
  source: "GO cellular_component"

- id: hydrophobicity_interface
  modality: ppi
  applies_to: [protein, protein]
  when: "a.surface_hydrophobicity > 0.44 or b.surface_hydrophobicity > 0.44"
  effect: safer_negative
  weight: 0.5                       # empirically calibrated; see rationale
  flag: hydrophobicity_interface_calibrated
  rationale: >
    Calibrated on DRYAD and UPNA-PPI (n=300/class;
    scripts/calibrate_hydrophobicity_threshold.py) using structure-aware
    surface_hydrophobicity (DSSP exposure + AlphaFold pLDDT masking over
    Kyte-Doolittle). Real PPIs show LOWER exposed hydrophobicity than
    non-interactions (AUROC 0.18–0.37 for the "low→interaction" direction),
    so the rule instead triggers on HIGH mutual hydrophobicity. This aligns
    with prior work showing interface hot spots are enriched in
    aromatic/cation–π residues and have distinct core composition
    (Bogan & Thorn 1998; Chakrabarti & Janin 2002). The calibration scores each
    pair by max(h_a, h_b), so the deployed condition uses `or`, not `and`:
    pairs where either protein already expose hydrophobic surface are more
    likely to be engaged in true interactions, making low mutual
    hydrophobicity a riskier negative. The 0.44 cutoff is the Youden’s J
    optimum across datasets and splits (0.425–0.448), yielding negative
    precision 0.54–0.80 and recall 0.47–0.76 for this max(h_a, h_b) > 0.44
    condition. Wimley–White and SAP were tested but did not improve
    performance.
  source: >
    Bogan & Thorn (1998) J Mol Biol 280:1–9.
    Chakrabarti & Janin (2002) Proteins 47:334–343.
    DRYAD (doi:10.5061/dryad.15dv41p84); UPNA-PPI
    (github.com/alxndgb/UPNA-PPI).

- id: no_shared_neighbors_low_expected_edge
  modality: ppi
  applies_to: [protein, protein]
  when: "disjoint(a.neighbors, b.neighbors) and (a.degree * b.degree) / a.graph_two_m < 0.01"
  effect: safer_negative
  weight: 0.7                       # topology, no_overlap/easy_negative proxy: 0.7-0.9
  rationale: >
    Two proteins with no shared interactors and a configuration-model expected
    edge count near zero are rarely adjacent in this network, so a non-edge
    between them is a safer negative.
  source: "TODO — threshold to confirm; mirrors negaverse/streams/topology.py::TopologyFilter"

- id: evolutionary_coupling_absence
  modality: ppi
  applies_to: [protein, protein]
  when: "a.evolutionary_coupling_score_with_b < 0.1"
  effect: safer_negative
  weight: 0.5                       # well-sampled orthologs: 0.5-0.7; conservative until MSA depth is checked
  rationale: >
    Proteins with no detectable co-evolution signal across well-sampled
    orthologs are less likely to form a conserved physical complex, making a
    non-edge a safer negative.
  source: "TODO — EVcouplings threshold to confirm"

- id: string_low_confidence_non_interaction
  modality: ppi
  applies_to: [protein, protein]
  when: "a.string_score_with_b < 0.15"
  effect: safer_negative
  weight: 0.55                      # database-confidence-score guidance: 0.5-0.6
  rationale: >
    STRING's physical-subnetwork confidence score aggregates evidence across
    experiments, curation, co-expression, and text-mining; a pair scoring
    below STRING's own reporting threshold has no supporting evidence in any
    channel, making a non-edge a safer negative.
  source: "STRING v12.0 (physical subnetwork), https://string-db.org/, combined_score < 0.15 (STRING's own lowest reporting cutoff)"

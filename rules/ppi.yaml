# Structural / biological rules for protein–protein interactions.
# One entry per rule. Deterministic filters evaluate `when`; the literature/LLM
# filter receives `rationale` as grounding context. Add a rule = add an entry.
# See rules/README.md for the field contract.

- id: colocalization_mismatch
  modality: ppi
  applies_to: [protein, protein]
  when: "disjoint(a.compartments, b.compartments)"
  effect: safer_negative            # safer_negative | riskier_negative | veto
  weight: 0.7                       # top of the "strong tendency, real exceptions" band (see AUTHORING.md Step 5)
  flag: different_compartment
  rationale: >
    Two proteins that never share a subcellular compartment are unlikely to
    physically interact, so a non-edge between them is a safer negative.
    Calibrated on DRYAD and UPNA-PPI (n=300/class;
    scripts/calibrate_colocalization_threshold.py) using GO cellular_component
    terms (scripts/fetch_go_localization.py). Jaccard(a.compartments,
    b.compartments) separates the classes strongly on DRYAD (AUROC
    0.906 optimistic / 0.875 protein-disjoint; the shipped disjoint-set rule
    itself fires on 71% of true negatives while misfiring on only 3% of true
    positives — 95% precision) but much more weakly on UPNA-PPI (AUROC 0.658 /
    0.738; 40% of true positives wrongly flagged), likely because UPNA-PPI's
    negatives are topology-hard (L3-based) rather than compartment-based, so a
    negative there isn't guaranteed to also be a compartment mismatch. This
    dataset-dependent split — a near-physical law on DRYAD, a real exception
    on UPNA-PPI — is exactly the "strong tendency, real exceptions" character
    that keeps this rule below hydrophobicity_interface's physicochemical
    weight despite comparable-or-stronger raw AUROC on DRYAD alone.
  source: >
    GO cellular_component (scripts/fetch_go_localization.py); DRYAD
    (doi:10.5061/dryad.15dv41p84); UPNA-PPI (github.com/alxndgb/UPNA-PPI).

- id: hydrophobicity_interface
  modality: ppi
  applies_to: [protein, protein]
  when: "a.surface_hydrophobicity > 0.44 or b.surface_hydrophobicity > 0.44"
  effect: safer_negative
  weight: 0.8                       # empirically calibrated on ppi structures interface
  flag: hydrophobicity_interface_calibrated
  rationale: >
    Calibrated on DRYAD and UPNA-PPI (n=300/class;
    scripts/calibrate_hydrophobicity_threshold.py) using structure-aware
    surface_hydrophobicity (DSSP exposure + AlphaFold pLDDT masking over
    Kyte-Doolittle). Real PPIs show LOWER exposed hydrophobicity than
    non-interactions (AUROC 0.18–0.37 for the "low→interaction" direction),
    so the rule instead triggers on HIGH mutual hydrophobicity. This aligns
    with prior work showing interface hot spots are enriched in
    aromatic/cation–π residues and have distinct core composition
    (Bogan & Thorn 1998; Chakrabarti & Janin 2002). The calibration scores each
    pair by max(h_a, h_b), so the deployed condition uses `or`, not `and`:
    pairs where either protein already expose hydrophobic surface are more
    likely to be engaged in true interactions, making low mutual
    hydrophobicity a riskier negative. The 0.44 cutoff is the Youden’s J
    optimum across datasets and splits (0.425–0.448), yielding negative
    precision 0.54–0.80 and recall 0.47–0.76 for this max(h_a, h_b) > 0.44
    condition. Wimley–White and SAP were tested but did not improve
    performance.
  source: >
    Bogan & Thorn (1998) J Mol Biol 280:1–9.
    Chakrabarti & Janin (2002) Proteins 47:334–343.
    DRYAD (doi:10.5061/dryad.15dv41p84); UPNA-PPI
    (github.com/alxndgb/UPNA-PPI).

- id: string_low_confidence_non_interaction
  modality: ppi
  applies_to: [protein, protein]
  when: "a.string_experimental_score_with_b < 0.15"
  effect: safer_negative
  weight: 0.55                      # database-confidence-score guidance: 0.5-0.6
  rationale: >
    STRING's `experimental` channel is direct wet-lab assay evidence (e.g.
    yeast two-hybrid, affinity capture) — the most direct channel STRING has,
    as opposed to `combined_score`, which also blends in weaker, indirect
    evidence (text-mining, coexpression) that shouldn't count for or against
    a pair on its own. A pair scoring below STRING's own reporting threshold
    on this specific channel has no direct experimental support, making a
    non-edge a safer negative. The opposite tail of this same channel
    (`experimental > 0.9`) is handled as a known-positive source
    (`rules/sources.yaml`'s `string_experimental_high_confidence`,
    `scripts/build_known_positive_sources.py`), not a rule here — that level
    of direct evidence is a plain "this pair is documented as interacting"
    fact for `KnownPositiveVeto`, not a biological-plausibility judgement the
    rule engine's `when`/`effect`/`weight` shape is for. See `rules/SOURCES.md`
    for why sources.yaml and the rule engine are different mechanisms.
  source: >
    STRING v12.0 (physical subnetwork), https://string-db.org/,
    experimental channel < 0.15 (STRING's own lowest reporting cutoff).
    scripts/compute_string_experimental.py.

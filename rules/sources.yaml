# External known-positive interaction sources, fed to KnownPositiveVeto
# (negaverse/streams/structured.py). See SOURCES.md for the field contract.
#
# Different mechanism from ppi.yaml/pli.yaml: a rule *scores* how plausible a
# non-edge is; an entry here is a plain lookup table of pairs documented as
# interacting somewhere, even if absent from whatever graph the pipeline is
# currently loading. A candidate matching any pair in any listed source is
# vetoed outright, same as a positive edge already in the graph.
#
# `enabled: false` a source without deleting it, once the (not-yet-written)
# loader honors the flag — lets a user pick which databases are actually
# unioned into KnownPositiveVeto for a given run.
#
# Staged entries below — `path` files are not yet placed under local-docs/, so
# every source currently warns and contributes nothing (see SOURCES.md
# "Status": the loader itself, negaverse/io/sources.py::load_positive_sources(),
# hasn't been written yet either). Fill in real version/date once sourced and
# place the corresponding file before relying on any of these.

# --- ppi: protein-protein gold-standard databases ---------------------------

- name: intact
  modality: ppi
  enabled: true
  path: local-docs/intact/intact_human_pairs.tsv
  id_space: uniprot
  description: IntAct curated protein-protein physical interactions (EBI).
  source: "IntAct, https://www.ebi.ac.uk/intact/, version/date TODO"

- name: biogrid_human
  modality: ppi
  enabled: true
  path: local-docs/biogrid/biogrid_human_pairs.tsv
  id_space: uniprot
  description: BioGRID human-human physical interactions.
  source: "BioGRID, https://thebiogrid.org, version/date TODO"

- name: dip
  modality: ppi
  enabled: true
  path: local-docs/dip/dip_human_pairs.tsv
  id_space: uniprot
  description: DIP (Database of Interacting Proteins) experimentally determined interactions.
  source: "DIP, https://dip.doe-mbi.ucla.edu/dip/Main.cgi, version/date TODO"

- name: hprd
  modality: ppi
  enabled: true
  path: local-docs/hprd/hprd_human_pairs.tsv
  id_space: uniprot
  description: >
    HPRD human protein-protein interactions. HPRD's raw export is keyed by
    gene symbol, not UniProt — resolve gene symbols to UniProt accessions
    (e.g. via HGNC / UniProt ID mapping, following the pattern in
    scripts/build_uniprot_ensembl_map.py) before placing the file at `path`,
    so `id_space` here reflects the post-mapping file, not HPRD's native
    format. Curation stopped around 2010; treat as a legacy/frozen source.
  source: "HPRD, http://www.hprd.org, version/date TODO"

- name: corum
  modality: ppi
  enabled: true
  path: local-docs/corum/corum_human_pairs.tsv
  id_space: uniprot
  description: >
    CORUM mammalian protein-complex subunit lists. Pairs must be derived as
    all pairwise combinations of subunits within each complex (co-complex
    membership as an interaction proxy), not taken directly from the source.
  source: "CORUM, https://mips.helmholtz-muenchen.de/corum/ — homepage only:
    the site is a JS-rendered SPA (curl/WebFetch can't crawl it, every
    guessed download path returns the same HTML shell); get the current
    release's allComplexes.txt/humanComplexes.txt from the in-browser
    Download page and record the exact version here once fetched."

- name: string
  modality: ppi
  enabled: true
  path: local-docs/string/string_human_pairs.tsv
  id_space: uniprot
  description: >
    STRING physical-subnetwork pairs at high confidence (combined_score >=
    0.7, i.e. STRING's own "high confidence" cutoff) used as known positives.
    STRING's native IDs are Ensembl protein IDs prefixed with taxid (e.g.
    9606.ENSP00000269305) — resolve to UniProt via STRING's own
    protein.aliases file before placing at `path`; see the low-confidence
    (<0.15) non-interaction threshold instead in rules/ppi.yaml
    (string_low_confidence_non_interaction) — a different mechanism, not this
    known-positive list.
  source: "STRING v12.0 (physical subnetwork), verified 2026-07-10:
    https://stringdb-downloads.org/download/protein.physical.links.v12.0/9606.protein.physical.links.v12.0.txt.gz
    (id mapping: https://stringdb-downloads.org/download/protein.aliases.v12.0/9606.protein.aliases.v12.0.txt.gz)"

# --- pli: protein-ligand gold-standard databases -----------------------------

- name: biolip2
  modality: pli
  enabled: true
  path: local-docs/biolip2/biolip2_pairs.tsv
  id_space: uniprot/pdb_ccd
  description: BioLiP2 PDB co-crystal protein-ligand binding pairs (direct physical binding).
  source: "BioLiP2, https://zhanggroup.org/BioLiP/, version/date TODO"

- name: bindingdb
  modality: pli
  enabled: true
  path: local-docs/bindingdb/bindingdb_pairs.tsv
  id_space: uniprot/inchikey
  description: >
    BindingDB direct-binding (Ki/Kd) protein-ligand pairs. Use exact InChIKey
    matches for this static list — BindingDB's own API does fuzzy
    Tanimoto/SMILES similarity search, which doesn't fit a flat pairs file.
  source: "BindingDB, https://bindingdb.org/, version/date TODO"

- name: pdbbind_plus
  modality: pli
  enabled: true
  path: local-docs/pdbbind/pdbbind_pairs.tsv
  id_space: uniprot/pdb_ccd
  description: PDBbind+ structure + affinity protein-ligand pairs (Kd/Ki preferred over IC50).
  source: "PDBbind+, http://pdbbind.org.cn/, version/date TODO (registration required)"

- name: chembl
  modality: pli
  enabled: true
  path: local-docs/chembl/chembl_pairs.tsv
  id_space: uniprot/inchikey
  description: >
    ChEMBL binding-assay (assay_type=B, Ki/Kd) protein-ligand pairs; exclude
    functional-only assays (IC50/EC50) — those aren't direct-binding evidence.
  source: "ChEMBL, https://www.ebi.ac.uk/chembl/, version/date TODO"

- name: gtopdb
  modality: pli
  enabled: true
  path: local-docs/gtopdb/gtopdb_pairs.tsv
  id_space: uniprot/inchikey
  description: >
    Guide to Pharmacology (GtoPdb) curated pKi/pKd protein-ligand pairs;
    exclude functional-only activity types (pIC50/pEC50/pA2/pKB).
  source: "Guide to Pharmacology, https://www.guidetopharmacology.org/, version/date TODO"

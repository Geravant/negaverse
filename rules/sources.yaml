# External known-positive interaction sources, fed to KnownPositiveVeto
# (negaverse/streams/structured.py). See SOURCES.md for the field contract.
#
# Different mechanism from ppi.yaml/pli.yaml: a rule *scores* how plausible a
# non-edge is; an entry here is a plain lookup table of pairs documented as
# interacting somewhere, even if absent from whatever graph the pipeline is
# currently loading. A candidate matching any pair in any listed source is
# vetoed outright, same as a positive edge already in the graph.
#
# The loader (negaverse/io/sources.py::load_positive_sources) IS wired now:
# KnownPositiveVeto.fit() reads this manifest, loads every source whose `path`
# exists (restricted to the current graph's node ids), and vetoes those pairs.
# `enabled: false` a source to exclude it from that union without deleting the
# entry. The `path` files below that aren't yet placed under local-docs/ are
# reported as "missing" in stats and contribute nothing — place a file at its
# `path` (2-column pairs) and it activates automatically. Fill in real
# version/date once sourced.

# --- ppi: protein-protein gold-standard databases ---------------------------

# Build the four files below from raw downloads with:
#   PYTHONPATH=. python scripts/build_known_positive_sources.py
# It extracts human-human physical pairs from BioGRID + IntAct into both a
# UniProt file (matches the SARS-CoV-2 graph, whose host nodes are UniProt) and
# an Ensembl-gene file (matches the HuRI benchmark, whose nodes are ENSG).

- name: intact
  modality: ppi
  enabled: true
  path: local-docs/intact/intact_human_pairs.tsv
  id_space: uniprot
  description: IntAct curated protein-protein molecular interactions (EBI), human-human.
  source: "IntAct, https://www.ebi.ac.uk/intact/, current release (FTP psimitab/species/human, 2026-01)"

- name: intact_human_ensembl
  modality: ppi
  enabled: true
  path: local-docs/intact/intact_human_pairs_ensembl.tsv
  id_space: ensembl
  description: IntAct human pairs mapped to Ensembl gene ids (engages the HuRI benchmark).
  source: "IntAct, mapped via UniProt->ENSG (local-docs/mappings/uniprot_ensg_human.tsv)"

- name: biogrid_human
  modality: ppi
  enabled: true
  path: local-docs/biogrid/biogrid_human_pairs.tsv
  id_space: uniprot
  description: BioGRID human-human physical interactions (SWISS-PROT accessions).
  source: "BioGRID 5.0.259, https://thebiogrid.org, tab3 ORGANISM Homo_sapiens (2026-07)"

- name: biogrid_human_ensembl
  modality: ppi
  enabled: true
  path: local-docs/biogrid/biogrid_human_pairs_ensembl.tsv
  id_space: ensembl
  description: BioGRID human physical pairs mapped to Ensembl gene ids (engages the HuRI benchmark).
  source: "BioGRID 5.0.259, mapped via UniProt->ENSG (local-docs/mappings/uniprot_ensg_human.tsv)"

# DIP and HPRD are registration/login-walled — they cannot be fetched by the
# build script and stay 'missing' until a file is placed by hand. Left staged.
- name: dip
  modality: ppi
  enabled: true
  path: local-docs/dip/dip_human_pairs.tsv
  id_space: uniprot
  description: DIP (Database of Interacting Proteins) experimentally determined interactions.
  source: "DIP, https://dip.doe-mbi.ucla.edu/dip/Main.cgi — download requires a (free) login; not auto-fetchable"

- name: hprd
  modality: ppi
  enabled: true
  path: local-docs/hprd/hprd_human_pairs.tsv
  id_space: uniprot
  description: >
    HPRD human protein-protein interactions. HPRD's raw export is keyed by
    gene symbol, not UniProt — resolve gene symbols to UniProt accessions
    (e.g. via HGNC / UniProt ID mapping, following the pattern in
    scripts/build_uniprot_ensembl_map.py) before placing the file at `path`,
    so `id_space` here reflects the post-mapping file, not HPRD's native
    format. Curation stopped around 2010; treat as a legacy/frozen source.
  source: "HPRD, http://www.hprd.org — registration-walled + legacy (frozen ~2010); not auto-fetchable"

- name: corum
  modality: ppi
  enabled: true
  path: local-docs/corum/corum_human_pairs.tsv
  id_space: uniprot
  description: >
    CORUM mammalian protein-complex subunit lists. Pairs must be derived as
    all pairwise combinations of subunits within each complex (co-complex
    membership as an interaction proxy), not taken directly from the source.
  source: "CORUM, https://mips.helmholtz-muenchen.de/corum/ — homepage only:
    the site is a JS-rendered SPA (curl/WebFetch can't crawl it, every
    guessed download path returns the same HTML shell); get the current
    release's allComplexes.txt/humanComplexes.txt from the in-browser
    Download page and record the exact version here once fetched."

- name: string
  modality: ppi
  enabled: true
  path: local-docs/string/string_human_pairs.tsv
  id_space: uniprot
  description: >
    STRING physical-subnetwork pairs at high confidence (combined_score >=
    0.7, i.e. STRING's own "high confidence" cutoff) used as known positives.
    STRING's native IDs are Ensembl protein IDs prefixed with taxid (e.g.
    9606.ENSP00000269305) — resolve to UniProt via STRING's own
    protein.aliases file before placing at `path`; see string_experimental_high_confidence
    below (a stricter, direct-evidence-only sibling) and the low-confidence
    (<0.15) non-interaction threshold instead in rules/ppi.yaml
    (string_low_confidence_non_interaction) — a different mechanism, not this
    known-positive list.
  source: "STRING v12.0 (physical subnetwork), verified 2026-07-10:
    https://stringdb-downloads.org/download/protein.physical.links.v12.0/9606.protein.physical.links.v12.0.txt.gz
    (id mapping: https://stringdb-downloads.org/download/protein.aliases.v12.0/9606.protein.aliases.v12.0.txt.gz)"

- name: string_experimental_high_confidence
  modality: ppi
  enabled: true
  path: local-docs/string/string_experimental_high_confidence_pairs.tsv
  id_space: uniprot
  description: >
    STRING pairs with direct experimental (wet-lab assay) evidence > 0.9 on
    STRING's `experimental` channel specifically — not `combined_score`, which
    blends in weaker indirect evidence (text-mining, coexpression) that
    shouldn't count as strongly as direct assay support. This level of direct
    experimental evidence is treated as a known positive (plain membership,
    outright veto) rather than a graded rule-engine signal — mirrors how
    BioGRID/IntAct documented interactions are already handled above. See
    rules/ppi.yaml's string_low_confidence_non_interaction for the
    complementary weak-negative threshold (<0.15) on this same channel.
  source: "STRING v12.0 (physical subnetwork), https://string-db.org/,
    experimental channel > 0.9 (raw > 900). Built by
    scripts/build_known_positive_sources.py — 24,266 unique UniProt pairs as
    of the v12.0 human links file."

- name: string_experimental_high_confidence_ensembl
  modality: ppi
  enabled: true
  path: local-docs/string/string_experimental_high_confidence_pairs_ensembl.tsv
  id_space: ensembl
  description: >
    string_experimental_high_confidence mapped to Ensembl gene ids (engages
    the HuRI benchmark) — same UniProt->ENSG mapping pattern as
    biogrid_human_ensembl/intact_human_ensembl above.
  source: "STRING v12.0 (physical subnetwork), experimental channel > 0.9
    (raw > 900), mapped via UniProt->ENSG
    (local-docs/mappings/uniprot_ensg_human.tsv). Built by
    scripts/build_known_positive_sources.py — 268 pairs within HuRI's node
    set as of the v12.0 human links file."

# --- pli: protein-ligand gold-standard databases -----------------------------

- name: biolip2
  modality: pli
  enabled: true
  path: local-docs/biolip2/biolip2_pairs.tsv
  id_space: uniprot/pdb_ccd
  description: BioLiP2 PDB co-crystal protein-ligand binding pairs (direct physical binding).
  source: "BioLiP2, https://zhanggroup.org/BioLiP/, version/date TODO"

- name: bindingdb
  modality: pli
  enabled: true
  path: local-docs/bindingdb/bindingdb_pairs.tsv
  id_space: uniprot/inchikey
  description: >
    BindingDB direct-binding (Ki/Kd) protein-ligand pairs. Use exact InChIKey
    matches for this static list — BindingDB's own API does fuzzy
    Tanimoto/SMILES similarity search, which doesn't fit a flat pairs file.
  source: "BindingDB, https://bindingdb.org/, version/date TODO"

- name: pdbbind_plus
  modality: pli
  enabled: true
  path: local-docs/pdbbind/pdbbind_pairs.tsv
  id_space: uniprot/pdb_ccd
  description: PDBbind+ structure + affinity protein-ligand pairs (Kd/Ki preferred over IC50).
  source: "PDBbind+, http://pdbbind.org.cn/, version/date TODO (registration required)"

- name: chembl
  modality: pli
  enabled: true
  path: local-docs/chembl/chembl_pairs.tsv
  id_space: uniprot/inchikey
  description: >
    ChEMBL binding-assay (assay_type=B, Ki/Kd) protein-ligand pairs; exclude
    functional-only assays (IC50/EC50) — those aren't direct-binding evidence.
  source: "ChEMBL, https://www.ebi.ac.uk/chembl/, version/date TODO"

- name: gtopdb
  modality: pli
  enabled: true
  path: local-docs/gtopdb/gtopdb_pairs.tsv
  id_space: uniprot/inchikey
  description: >
    Guide to Pharmacology (GtoPdb) curated pKi/pKd protein-ligand pairs;
    exclude functional-only activity types (pIC50/pEC50/pA2/pKB).
  source: "Guide to Pharmacology, https://www.guidetopharmacology.org/, version/date TODO"
